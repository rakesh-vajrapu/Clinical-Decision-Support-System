name: Deploy Backend to Azure

on:
  push:
    branches: [main]
    paths-ignore:
      - 'frontend/**'
      - 'README.md'
      - 'Assets/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Log into Azure Container Registry
      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: cdssregistryrakesh.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 3. Build Docker image tagged with commit SHA
      - name: Build Docker image
        run: |
          docker build -t cdssregistryrakesh.azurecr.io/cdss-backend:${{ github.sha }} .

      # 4. Push image to ACR
      - name: Push to ACR
        run: |
          docker push cdssregistryrakesh.azurecr.io/cdss-backend:${{ github.sha }}

      # 5. Deploy to Azure App Service
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: cdss-backend
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: cdssregistryrakesh.azurecr.io/cdss-backend:${{ github.sha }}
