<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d1f35"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#FF0080"/>
    </linearGradient>
  </defs>
  <!-- Dark rounded background -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="32" cy="28" r="19" fill="none" stroke="url(#g1)" stroke-width="1.8" opacity="0.5"/>
  <!-- AI Chip / Processor icon inside circle -->
  <!-- Central chip square -->
  <rect x="24" y="20" width="16" height="16" rx="3" fill="none" stroke="url(#g1)" stroke-width="2"/>
  <!-- Chip pins - top -->
  <line x1="29" y1="17" x2="29" y2="20" stroke="url(#g1)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="35" y1="17" x2="35" y2="20" stroke="url(#g1)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Chip pins - bottom -->
  <line x1="29" y1="36" x2="29" y2="39" stroke="url(#g2)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="35" y1="36" x2="35" y2="39" stroke="url(#g2)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Chip pins - left -->
  <line x1="21" y1="25" x2="24" y2="25" stroke="url(#g1)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="21" y1="31" x2="24" y2="31" stroke="url(#g2)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Chip pins - right -->
  <line x1="40" y1="25" x2="43" y2="25" stroke="url(#g1)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="31" x2="43" y2="31" stroke="url(#g2)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- AI text/circuit inside chip -->
  <text x="32" y="31" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="10" fill="url(#g1)">AI</text>
  <!-- Medical plus at bottom -->
  <rect x="28.5" y="44" width="7" height="13" rx="2" fill="url(#g1)" opacity="0.9"/>
  <rect x="25" y="47.5" width="14" height="6" rx="2" fill="url(#g1)" opacity="0.9"/>
</svg>
